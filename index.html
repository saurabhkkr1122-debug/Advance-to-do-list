
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Todo Dashboard</title>

    <link rel="stylesheet" href="css/style.css">

    <!-- Chart.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

    <div class="app-layout">

        <!-- Sidebar -->
        <aside class="sidebar">

            <h2>🚀 Todo App</h2>

            <ul>
                <li>
                    <a href="index.html">📊 Dashboard</a>
                </li>

                <li>
                    <a href="calendar.html">📅 Calendar</a>
                </li>

                <li>
                    <a href="#analytics">📈 Analytics</a>
                </li>
            </ul>

            <button onclick="logout()">
                Logout
            </button>

        </aside>

        <!-- Main Content -->
        <main class="main-content">

            <!-- Navbar -->
            <nav class="navbar">

                <div class="logo">
                    🚀 Advanced Todo
                </div>

                <div class="nav-right">

                    <button id="themeBtn">
                        🌙 Theme
                    </button>

                </div>

            </nav>

            <!-- Statistics -->
            <div class="stats">

                <div class="card">
                    <h2 id="totalTasks">0</h2>
                    <p>Total Tasks</p>
                </div>

                <div class="card">
                    <h2 id="completedTasks">0</h2>
                    <p>Completed Tasks</p>
                </div>

                <div class="card">
                    <h2 id="pendingTasks">0</h2>
                    <p>Pending Tasks</p>
                </div>

            </div>

            <!-- Task Form -->
            <div class="task-form">

                <input
                    type="text"
                    id="taskInput"
                    placeholder="Enter Task">

                <button onclick="startVoice()">
                    🎤 Voice
                </button>

                <input
                    type="date"
                    id="dueDate">

                <select id="category">
                    <option>Work</option>
                    <option>Study</option>
                    <option>Personal</option>
                </select>

                <select id="priority">
                    <option>High</option>
                    <option>Medium</option>
                    <option>Low</option>
                </select>

                <button onclick="addTask()">
                    Add Task
                </button>

            </div>

            <!-- Search -->
            <div class="search-box">

                <input
                    type="text"
                    id="search"
                    placeholder="Search Task..."
                    onkeyup="searchTask()">

            </div>

            <!-- Filter -->
            <div class="filter-box">

                <select onchange="filterTasks(this.value)">

                    <option value="all">
                        All Tasks
                    </option>

                    <option value="completed">
                        Completed
                    </option>

                    <option value="pending">
                        Pending
                    </option>

                </select>

            </div>

            <!-- Progress -->
            <div class="progress-container">

                <div class="progress-bar">

                    <div id="progress"></div>

                </div>

            </div>

            <!-- Task List -->
            <ul id="taskList"></ul>

            <!-- Analytics Section -->
            <section id="analytics">

                <h2>📊 Task Analytics</h2>

                <canvas id="taskChart"></canvas>

            </section>

        </main>

    </div>

    <!-- Login Protection -->
    <script>

        if (
            localStorage.getItem("isLoggedIn") !== "true"
        ) {
            window.location.href =
                "pages/login.html";
        }

    </script>

    <!-- JavaScript Files -->
    <script type="module" src="js/auth.js"></script>
    <script src="js/task.js"></script>
    <script src="js/advanced.js"></script>
    <script src="js/chart.js"></script>

</body>

</html>
