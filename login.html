<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Login</title>

<link rel="stylesheet"
href="../css/auth.css">

</head>

<body>

<div class="container">

<h2>Login</h2>

<input
type="email"
id="loginEmail"
placeholder="Email">

<input
type="password"
id="loginPassword"
placeholder="Password">

<button onclick="login()">
Login
</button>

<p>

Don't have an account?

<a href="signup.html">
Signup
</a>

</p>

</div>

<script type="module" src="../js/auth.js"></script>

</body>
</html>
