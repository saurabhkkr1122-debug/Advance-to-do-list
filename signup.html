<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Signup</title>

<link rel="stylesheet"
href="../css/auth.css">
</head>

<body>

<div class="container">

<h2>Create Account</h2>


<input
type="email"
id="email"
placeholder="Email">

<input
type="password"
id="password"
placeholder="Password">

<button onclick="signup()">
Sign Up
</button>

<p>
Already have an account?

<a href="login.html">
Login
</a>

</p>

</div>

<script type="module" src="../js/auth.js"></script>

</body>
</html>
